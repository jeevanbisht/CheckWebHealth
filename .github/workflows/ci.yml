name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# The unit tests are pure (classification/config helpers), but they import
# probe-core.mjs which has a top-level `import ... from "playwright"`, so the
# npm package must be installed. The Playwright *browsers* are NOT needed for
# these tests, so we skip that download to keep CI fast.
env:
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

jobs:
  test:
    name: Unit tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test
